<!DOCTYPE html>
<html>

<head>

  <title>POS Brokers Login</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="login-box">

    <h1>
      POS Brokers Ticketing
    </h1>

    <input
      type="text"
      id="email"
      placeholder="Username"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

  </div>

  <script src="app.js"></script>

</body>

</html>

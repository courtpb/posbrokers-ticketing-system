<!DOCTYPE html>
<html>
<head>
  <title>Completed Tickets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLogin(); loadTickets(['Completed'], 'completedContainer')">

<div class="header">
  <div class="logo">POS Brokers Ticketing</div>

  <div class="menu">
    <a href="create-ticket.html">Create Ticket</a>
    <a href="active-tickets.html">Active Tickets</a>
    <a href="completed-tickets.html">Completed Tickets</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="container">
  <div class="card">

    <h2>Completed Tickets</h2>

    <div class="search-box">
      <input
        type="text"
        id="searchCompleted"
        placeholder="Search completed tickets..."
        onkeyup="searchTickets('searchCompleted', 'completedContainer')"
      >
    </div>

    <button onclick="exportCSV()">
      Export CSV
    </button>

    <br><br>

    <div id="completedContainer"></div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>

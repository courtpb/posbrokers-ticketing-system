<!DOCTYPE html>
<html>

<head>
  <title>Create Ticket</title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body onload="checkLogin()">

<div class="header">

  <div class="logo">
    POS Brokers Tickets
  </div>

  <div class="menu">

    <a href="create-ticket.html">
      Create Ticket
    </a>

    <a href="active-tickets.html">
      Active Tickets
    </a>

    <button onclick="logout()">
      Logout
    </button>

  </div>

</div>

<div class="container">

  <div class="card">

    <h2>Create Ticket</h2>

    <form onsubmit="createTicket(event)">

      <!-- BUSINESS NAME -->

      <input
        id="businessName"
        placeholder="Business Name"
        required
      >

      <br><br>

      <!-- MERCHANT ID -->

      <input
        id="merchantId"
        placeholder="Merchant ID"
      >

      <br><br>

      <!-- REQUESTER -->

      <input
        id="requester"
        placeholder="Requester"
      >

      <br><br>

      <!-- DATE -->

      <input
        id="date"
        type="date"
      >

      <br><br>

      <!-- TICKET TYPE -->

      <label>
        <b>Ticket Type</b>
      </label>

      <select id="ticketType">

        <option value="Unassigned">
          Unassigned
        </option>

        <option value="External">
          External
        </option>

        <option value="Internal">
          Internal
        </option>

      </select>

      <br><br>

      <!-- ASSIGNED TO -->

      <label>
        <b>Assign Ticket To</b>
      </label>

      <select id="assignedTo">

        <option value="Bryan">
          Bryan
        </option>

        <option value="Che">
          Che
        </option>

        <option value="Courtney">
          Courtney
        </option>

        <option value="Pat">
          Pat
        </option>

      </select>

      <br><br>

      <!-- STATUS -->

      <select id="progress">

        <option>
          New
        </option>

        <option>
          In Progress
        </option>

        <option>
          Completed
        </option>

      </select>

      <br><br>

      <!-- PRIORITY -->

      <select id="priority">

        <option value="low">
          Low Priority
        </option>

        <option value="medium">
          Medium Priority
        </option>

        <option value="high">
          High Priority
        </option>

      </select>

      <br><br>

      <!-- REQUEST -->

      <textarea
        id="request"
        placeholder="Request Details"
      ></textarea>

      <br><br>

      <!-- NOTES -->

      <textarea
        id="notes"
        placeholder="Initial Note"
      ></textarea>

      <br><br>

      <!-- BUTTON -->

      <button type="submit">
        Create Ticket
      </button>

    </form>

  </div>

</div>

<script src="app.js"></script>

</body>

</html>

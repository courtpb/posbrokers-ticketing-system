<!DOCTYPE html>
<html>

<head>

  <title>Active Tickets</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body onload="checkLogin(); render();">

<div class="header">

  <div class="logo">
    POS Brokers Tickets
  </div>

  <div class="menu">

    <a href="create-ticket.html">
      Create Ticket
    </a>

    <a href="active-tickets.html">
      Active Tickets
    </a>

    <button onclick="logout()">
      Logout
    </button>

  </div>

</div>

<div class="container">

  <div class="card">

    <!-- DASHBOARD -->

    <div class="stats">

      <div
        class="stat"
        id="statAll"
      >
        All: 0
      </div>

      <div
        class="stat"
        id="statNew"
      >
        New: 0
      </div>

      <div
        class="stat"
        id="statProg"
      >
        In Progress: 0
      </div>

      <div
        class="stat"
        id="statDone"
      >
        Completed: 0
      </div>

    </div>

    <!-- FILTERS -->

    <div class="filters">

      <input
        id="search"
        placeholder="Search tickets..."
        onkeyup="render()"
      >

      <select
        id="filter"
        onchange="render()"
      >

        <option value="All">
          All
        </option>

        <option value="New">
          New
        </option>

        <option value="In Progress">
          In Progress
        </option>

        <option value="Completed">
          Completed
        </option>

      </select>

      <button onclick="exportTickets()">
        Export All Tickets
      </button>

    </div>

    <!-- ACTIVE TICKETS -->

    <div id="activeContainer">

      <!-- TICKETS LOAD HERE -->

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>

</html>
